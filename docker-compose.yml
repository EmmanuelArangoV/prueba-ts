version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: horus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: horus_user
      POSTGRES_PASSWORD: horus_password
      POSTGRES_DB: horus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: